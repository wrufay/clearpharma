<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClearPharma - Login</title>
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="stylesheet" href="styles/main.css" />

    <!-- this is how you link multiple stylesheets right? -->
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <div class="logo-icon">
          <img src="styles/search-svgrepo-com%20(1).svg" />
        </div>
        <h1 class="main">ClearPharma</h1>
        <p class="main">Transparent solutions, today.</p>
      </div>

      <div class="welcome">
        <p>Please select your account to continue.</p>
      </div>

      <div class="error-message" id="errorMessage"></div>
      <div class="success-message" id="successMessage"></div>

      <div class="user-type">
        <button
          class="active"
          id="patientBtn"
          onclick="selectUserType('patient')"
        >
          Patient
        </button>
        <button id="pharmacistBtn" onclick="selectUserType('pharmacist')">
          Pharmacist
        </button>
      </div>

      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" />
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          placeholder="Enter your password"
        />
      </div>

      <div class="forgot-password">
        <a href="#" onclick="resetPassword(); return false;"
          >Forgot password?</a
        >
      </div>

      <button class="login-btn" id="loginBtn" onclick="handleLogin()">
        Sign In
      </button>

      <div class="signup-link">
        Don't have an account?
        <a href="#" onclick="showSignup(); return false;">Sign up</a>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import {
        getAuth,
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword,
        sendPasswordResetEmail,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
      import {
        getFirestore,
        doc,
        setDoc,
        getDoc,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDwMTaAWC1crZgt-qYPA8coG_0ufUBpWBg",
        authDomain: "clearpharma-d267f.firebaseapp.com",
        projectId: "clearpharma-d267f",
        storageBucket: "clearpharma-d267f.firebasestorage.app",
        messagingSenderId: "163400096970",
        appId: "1:163400096970:web:cf0c6a3e0662823570a833",
        measurementId: "G-T0LF1E23E4",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      window.auth = auth;
      window.db = db;
      window.firebaseAuth = {
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword,
        sendPasswordResetEmail,
      };
      window.firestore = { doc, setDoc, getDoc };
    </script>

    <script>
      let userType = "patient";

      // Create floating particles
      function createParticles() {
        for (let i = 0; i < 5; i++) {
          setTimeout(() => {
            const particle = document.createElement("div");
            particle.className = "particle";
            particle.style.left = Math.random() * 100 + "%";
            particle.style.animationDelay = Math.random() * 5 + "s";
            particle.style.animationDuration = Math.random() * 10 + 10 + "s";
            document.body.appendChild(particle);

            setTimeout(() => particle.remove(), 15000);
          }, i * 3000);
        }
      }

      createParticles();
      setInterval(createParticles, 15000);

      function selectUserType(type) {
        userType = type;
        const patientBtn = document.getElementById("patientBtn");
        const pharmacistBtn = document.getElementById("pharmacistBtn");

        if (type === "patient") {
          patientBtn.classList.add("active");
          pharmacistBtn.classList.remove("active");
        } else {
          pharmacistBtn.classList.add("active");
          patientBtn.classList.remove("active");
        }
      }

      function showError(message) {
        const errorEl = document.getElementById("errorMessage");
        errorEl.textContent = message;
        errorEl.style.display = "block";
        setTimeout(() => {
          errorEl.style.display = "none";
        }, 5000);
      }

      function showSuccess(message) {
        const successEl = document.getElementById("successMessage");
        successEl.textContent = message;
        successEl.style.display = "block";
        setTimeout(() => {
          successEl.style.display = "none";
        }, 3000);
      }

      async function handleLogin() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const loginBtn = document.getElementById("loginBtn");

        if (!email || !password) {
          showError("Please fill in all fields");
          return;
        }

        loginBtn.disabled = true;
        loginBtn.classList.add("loading");
        loginBtn.textContent = "Signing in...";

        try {
          const userCredential =
            await window.firebaseAuth.signInWithEmailAndPassword(
              window.auth,
              email,
              password
            );
          const user = userCredential.user;

          const userDoc = await window.firestore.getDoc(
            window.firestore.doc(window.db, "users", user.uid)
          );

          if (!userDoc.exists()) {
            showError("User profile not found. Please contact support.");
            loginBtn.disabled = false;
            loginBtn.classList.remove("loading");
            loginBtn.textContent = "Sign In";
            return;
          }

          const userData = userDoc.data();

          if (userData.role !== userType) {
            showError(
              `This account is registered as ${userData.role}. Please select the correct login type.`
            );
            loginBtn.disabled = false;
            loginBtn.classList.remove("loading");
            loginBtn.textContent = "Sign In";
            return;
          }

          localStorage.setItem("userId", user.uid);
          localStorage.setItem("userEmail", user.email);
          localStorage.setItem("userRole", userData.role);
          localStorage.setItem("userName", userData.name);

          showSuccess("Login successful! Redirecting...");

          setTimeout(() => {
            if (userData.role === "patient") {
              window.location.href = "pages/patient-dashboard.html";
            } else if (userData.role === "pharmacist") {
              window.location.href = "pages/pharmacist-dashboard.html";
            } else if (userData.role === "service_team") {
              window.location.href = "pages/service-dashboard.html";
            }
          }, 1500);
        } catch (error) {
          let errorMessage = "Login failed. Please try again.";

          if (error.code === "auth/user-not-found") {
            errorMessage = "No account found with this email.";
          } else if (error.code === "auth/wrong-password") {
            errorMessage = "Incorrect password.";
          } else if (error.code === "auth/invalid-email") {
            errorMessage = "Invalid email address.";
          } else if (error.code === "auth/too-many-requests") {
            errorMessage = "Too many failed attempts. Please try again later.";
          }

          showError(errorMessage);
          loginBtn.disabled = false;
          loginBtn.classList.remove("loading");
          loginBtn.textContent = "Sign In";
        }
      }

      async function resetPassword() {
        const email = document.getElementById("email").value.trim();

        if (!email) {
          showError("Please enter your email address first");
          return;
        }

        try {
          await window.firebaseAuth.sendPasswordResetEmail(window.auth, email);
          showSuccess("Password reset email sent! Check your inbox.");
        } catch (error) {
          showError("Failed to send password reset email. Please try again.");
        }
      }

      function showSignup() {
        window.location.href = "pages/signup.html";
      }

      document
        .getElementById("password")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            handleLogin();
          }
        });
    </script>
  </body>
</html>
